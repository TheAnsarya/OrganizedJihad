name: API Tests and Simulator Calibration

on:
  push:
    branches:
      - main
      - api-backend-creation
      - 'feature/**'
      - 'fix/**'
  pull_request:

jobs:
  api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore API test project
        run: dotnet restore tests/OrganizedJihad.Api.Tests/OrganizedJihad.Api.Tests.csproj

      - name: Run API tests with coverage
        run: dotnet test tests/OrganizedJihad.Api.Tests/OrganizedJihad.Api.Tests.csproj --configuration Release --no-restore --collect:"XPlat Code Coverage"

      - name: Run simulator calibration tests explicitly
        run: dotnet test tests/OrganizedJihad.Api.Tests/OrganizedJihad.Api.Tests.csproj --configuration Release --no-restore --filter "FullyQualifiedName~BattleSimulationCalibrationTests"
